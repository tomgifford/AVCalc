<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel, Time, and Distance to Climb Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h1>Fuel, Time, and Distance to Climb</h1>

    <div class="input-group">
        <label for="aircraft-type">Aircraft Type</label>
        <select id="aircraft-type">
            <option value="pa28-161">Piper PA-28-161 Warrior II</option>
        </select>
    </div>

    <div style="display: flex; gap: 1rem;">
        <div class="input-group" style="flex: 1;">
            <label for="temp">Temp (°C)</label>
            <input type="number" id="temp" placeholder="e.g. 15" step="1.0" value="15">
        </div>
        <div class="input-group" style="flex: 1;">
            <label for="altimeter">Altimeter (inHg)</label>
            <input type="number" id="altimeter" placeholder="e.g. 29.92" step="0.01" value="29.92">
        </div>
    </div>

    <div class="input-group">
        <label for="altitude">Pressure Altitude, Cruise (ft)</label>
        <input type="number" id="altitude" placeholder="e.g. 5000" step="500" value="5000">
    </div>

    <div class="input-group">
        <label for="start-altitude">Pressure Altitude, Starting (ft)</label>
        <input type="number" id="start-altitude" placeholder="e.g. 0" step="500" value="0">
    </div>

    <div class="result-area">
        <div class="result-label" style="margin-top: 1rem;">Pressure Altitude (at target)</div>
        <div class="result-value" id="output-pa">-- <span class="unit">ft</span></div>
        <div style="display: flex; justify-content: center; gap: 2rem; margin-top: 1rem;">
            <div>
                <div class="result-label">Est. Time to Climb</div>
                <div class="result-value" id="climb-time">-- <span class="unit">min</span></div>
            </div>
            <div>
                <div class="result-label">Est. Distance to Climb</div>
                <div class="result-value" id="climb-dist">-- <span class="unit">nm</span></div>
            </div>
            <div>
                <div class="result-label">Est. Fuel to Climb</div>
                <div class="result-value" id="climb-fuel">-- <span class="unit">gal</span></div>
            </div>
        </div>
        <div style="margin-top: 0.75rem;">
            <a href="#" id="details-link" style="font-size: 0.75rem; text-decoration: none; color: var(--primary-color);">Details</a>
        </div>
        <div id="details-container" style="display: none; margin-top: 0.5rem; font-size: 0.875rem; color: #64748b; border-top: 1px solid #cbd5e1; padding-top: 0.5rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; gap: 0.5rem;">
                <span>T: <span id="temp-target">--</span>°C</span>
                <span>PA: <span id="pa-target">--</span>ft</span>
                <span style="color: var(--text-color); font-weight: 600;">Target: <span id="dist-target">--</span> nm / <span id="time-target">--</span> min / <span id="fuel-target">--</span> gal</span>
            </div>
            <div style="display: flex; justify-content: space-between; gap: 0.5rem;">
                <span>T: <span id="temp-start">--</span>°C</span>
                <span>PA: <span id="pa-start">--</span>ft</span>
                <span style="color: var(--text-color); font-weight: 600;">Start: <span id="dist-start">--</span> nm / <span id="time-start">--</span> min / <span id="fuel-start">--</span> gal</span>
            </div>
        </div>
    </div>
</div>

<script src="js/pa28-161-data.js"></script>
<script src="js/climb-calc.js"></script>
<script src="js/app.js"></script>
</body>
</html>
